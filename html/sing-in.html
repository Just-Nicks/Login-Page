<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Login Page</title>
</head>
<body>
    <div class="center-box">
        <div id="alert" class="alert">
            <img src="../icons/priority_high_24dp.svg">
            Incorrect Password or User
        </div>
    </div>
    <div class="main">
        <div class="login-box">
            <div class="text-box">
                <h1>Welcome Back!</h1>
                <p>Please enter your details:</p>
            </div>
            <div class="input-box">
                <label>User:</label>
                <input type="text" id="user">
            </div>
            <div class="input-box">
                <label>Password:</label>
                <input type="password" id="passwd">
            </div>
            <div class="link">
                <a href="./forget-pass.html">Forget Password</a>
            </div>
            <div class="button">
                <button id="sing_in">Sing In</button>
            </div>
            <div class="link">
                <p>Don't have an account?</p><a href="./sing-up.html">Sing-up</a>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
