<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Login Page</title>
</head>
<body>
    <div class="center-box">
    </div>
    <div class="main">
        <div class="login-box">
            <div class="text-box">
                <h1>Welcome!</h1>
                <p>Please enter details:</p>
            </div>
            <div class="input-box">
                <label>User Name:</label>
                <input type="text" id="user">
            </div>
            <div class="input-box">
                <label>Email:</label>
                <input type="email">
            </div>
            <div class="input-box">
                <label>Password:</label>
                <input type="password" id="passwd">
            </div>
            <div class="link">
                <p>Have an account?</p>
                <a href="./sing-in.html">Sing-in</a>
            </div>
            <div class="button">
                <button id="">Sing Up</button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
